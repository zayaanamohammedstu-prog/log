<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogGuard — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center px-4">

<div id="toast-container"></div>

<div class="w-full max-w-sm">
  <!-- Brand -->
  <div class="text-center mb-8">
    <span class="text-5xl">🛡</span>
    <h1 class="text-2xl font-extrabold mt-3 tracking-tight">LogGuard</h1>
    <p class="text-gray-400 text-sm mt-1">Audit Workbench</p>
  </div>

  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-xl">
    <h2 class="text-lg font-bold mb-6 text-center">Sign in to your account</h2>

    {% if no_users %}
    <div class="bg-yellow-900/30 border border-yellow-700 text-yellow-300 rounded-lg px-4 py-3 text-sm mb-5">
      <strong>Setup required:</strong> No users exist. Set <code>LOGGUARD_ADMIN_USERNAME</code> and <code>LOGGUARD_ADMIN_PASSWORD</code> env vars and restart.
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}" id="loginForm" class="space-y-4">
      <input
        type="text" name="username" id="username"
        placeholder="Username"
        autocomplete="username" required autofocus
        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-blue-500 placeholder-gray-500"
      />
      <input
        type="password" name="password" id="password"
        placeholder="Password"
        autocomplete="current-password" required
        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-blue-500 placeholder-gray-500"
      />
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-lg transition text-sm">
        Sign In
      </button>
    </form>

    {% if signup_allowed %}
    <p class="text-center mt-5 text-sm text-gray-400">
      No account yet? <a href="{{ url_for('register') }}" class="text-blue-400 hover:underline">Create an account</a>
    </p>
    {% endif %}
  </div>

  <p class="text-center mt-6 text-xs text-gray-600">LogGuard Audit Workbench &copy; 2024</p>
</div>

<script>
function showToast(msg, type='info', duration=4000) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  c.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, duration);
}
{% if error %}
document.addEventListener('DOMContentLoaded', () => showToast({{ error | tojson }}, 'error'));
{% endif %}
</script>
</body>
</html>
